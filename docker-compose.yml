version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: eng_backend
    ports:
      - "4001:4001"
    environment:
      - NODE_ENV=production
      - PORT=4001
      # Use the URL you type into your browser to see the site
      - CORS_ORIGIN=${FRONTEND_URL:-http://localhost:3001}
      # Populated from your local .env file
      - N8N_YOUTUBE_CHAT_WEBHOOK_URL=${N8N_YOUTUBE_CHAT_WEBHOOK_URL}
      - N8N_USERNAME=${N8N_USERNAME:-n8n}
      - N8N_PASSWORD=${N8N_PASSWORD:-n8n}
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        # This MUST be the public URL of your backend that the browser can see
        NEXT_PUBLIC_API_URL: ${BACKEND_URL:-http://localhost:4001}
    container_name: eng_frontend
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=production
      - PORT=3001
    depends_on:
      - backend
    restart: unless-stopped
